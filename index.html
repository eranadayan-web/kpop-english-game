<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>KPop Demon Hunters 🌸 - אנגלית עם רומי</title>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0021;
      --bg2: #1a0040;
      --purple: #6b21a8;
      --pink: #ff2d9e;
      --cyan: #00f5d4;
      --gold: #ffd700;
      --white: #f0e6ff;
      --card: #1e0050;
      --card2: #2a0070;
      --danger: #ff4444;
      --green: #00e676;
      --shadow-pink: 0 0 20px rgba(255,45,158,0.5);
      --shadow-cyan: 0 0 20px rgba(0,245,212,0.5);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--white);
      font-family: 'Rubik', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      direction: rtl;
    }
    #app { min-height: 100vh; position: relative; }

    /* PARTICLES */
    .particle { position: fixed; pointer-events: none; font-size: 16px; animation: float-up 4s linear infinite; opacity: 0; z-index: 0; }
    @keyframes float-up { 0%{transform:translateY(110vh) rotate(0deg);opacity:0} 10%{opacity:0.7} 90%{opacity:0.4} 100%{transform:translateY(-10vh) rotate(360deg);opacity:0} }

    /* SCREENS */
    .screen { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; position: relative; z-index: 1; }

    /* WELCOME SCREEN */
    .welcome-bg { background: radial-gradient(ellipse at 50% 0%, #3d0080 0%, #1a0040 40%, #0d0021 100%); }
    .game-logo { text-align: center; margin-bottom: 20px; }
    .game-logo .title-en {
      font-family: 'Orbitron', monospace;
      font-size: clamp(22px, 5vw, 42px);
      background: linear-gradient(90deg, var(--pink), var(--cyan), var(--gold));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      text-shadow: none; letter-spacing: 2px;
      filter: drop-shadow(0 0 15px var(--pink));
    }
    .game-logo .title-he { font-size: clamp(16px, 3.5vw, 26px); color: var(--cyan); margin-top: 5px; font-weight: 700; }
    .romi-container { position: relative; display: flex; flex-direction: column; align-items: center; margin: 15px 0; }
    .romi-svg { width: 160px; height: 220px; filter: drop-shadow(0 0 20px var(--pink)); animation: romi-float 3s ease-in-out infinite; }
    @keyframes romi-float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
    .romi-name { font-size: 22px; font-weight: 900; color: var(--gold); text-shadow: 0 0 15px var(--gold); margin-top: 5px; }
    .romi-tagline { font-size: 14px; color: var(--cyan); opacity: 0.8; margin-top: 3px; }
    .btn-primary {
      background: linear-gradient(135deg, var(--pink), #a020f0);
      border: none; border-radius: 50px; color: white; font-family: 'Rubik', sans-serif;
      font-size: 20px; font-weight: 700; padding: 15px 50px; cursor: pointer;
      box-shadow: var(--shadow-pink); transition: all 0.2s; margin: 8px;
      display: inline-flex; align-items: center; gap: 8px;
    }
    .btn-primary:hover { transform: scale(1.06); box-shadow: 0 0 35px rgba(255,45,158,0.7); }
    .btn-primary:active { transform: scale(0.97); }
    .btn-secondary {
      background: transparent; border: 2px solid var(--cyan); border-radius: 50px;
      color: var(--cyan); font-family: 'Rubik', sans-serif; font-size: 16px; font-weight: 600;
      padding: 10px 30px; cursor: pointer; transition: all 0.2s; margin: 8px;
    }
    .btn-secondary:hover { background: rgba(0,245,212,0.1); box-shadow: var(--shadow-cyan); }
    .stats-bar { display: flex; gap: 20px; align-items: center; justify-content: center; margin-top: 10px; }
    .stat-item { display: flex; align-items: center; gap: 6px; font-size: 14px; color: var(--gold); }

    /* LEVEL SELECT */
    .level-screen { background: radial-gradient(ellipse at 30% 50%, #1a004a 0%, #0d0021 70%); }
    .screen-title { font-size: clamp(20px, 4vw, 32px); font-weight: 900; text-align: center; margin-bottom: 25px; }
    .screen-title span { background: linear-gradient(90deg, var(--pink), var(--cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .grades-grid { display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; width: 100%; max-width: 900px; }
    .grade-card {
      background: linear-gradient(135deg, var(--card), var(--card2));
      border: 2px solid transparent; border-radius: 20px; padding: 25px 20px;
      width: clamp(200px, 28vw, 260px); text-align: center; cursor: pointer;
      transition: all 0.3s; position: relative; overflow: hidden;
    }
    .grade-card::before { content:''; position:absolute; inset:0; border-radius:20px; padding:2px; background: linear-gradient(135deg, var(--pink), var(--purple), var(--cyan)); -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); -webkit-mask-composite: xor; mask-composite: exclude; }
    .grade-card:hover { transform: translateY(-8px) scale(1.02); box-shadow: 0 15px 40px rgba(107,33,168,0.5); }
    .grade-card .grade-emoji { font-size: 48px; margin-bottom: 10px; display: block; }
    .grade-card .grade-num { font-family: 'Orbitron', monospace; font-size: 28px; font-weight: 900; color: var(--gold); }
    .grade-card .grade-he { font-size: 16px; color: var(--cyan); margin: 5px 0; }
    .grade-card .grade-desc { font-size: 12px; color: rgba(240,230,255,0.6); }
    .diff-selector { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: 20px; width: 100%; }
    .diff-btn {
      padding: 12px 28px; border-radius: 50px; border: 2px solid; font-family: 'Rubik', sans-serif;
      font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.2s;
    }
    .diff-easy { border-color: var(--green); color: var(--green); background: rgba(0,230,118,0.1); }
    .diff-easy:hover { background: rgba(0,230,118,0.25); box-shadow: 0 0 20px rgba(0,230,118,0.4); }
    .diff-medium { border-color: var(--gold); color: var(--gold); background: rgba(255,215,0,0.1); }
    .diff-medium:hover { background: rgba(255,215,0,0.25); box-shadow: 0 0 20px rgba(255,215,0,0.4); }
    .diff-hard { border-color: var(--pink); color: var(--pink); background: rgba(255,45,158,0.1); }
    .diff-hard:hover { background: rgba(255,45,158,0.25); box-shadow: var(--shadow-pink); }

    /* GAME HUB */
    .hub-header { display:flex; align-items:center; gap:15px; margin-bottom:25px; width:100%; max-width:800px; }
    .level-badge { background: linear-gradient(135deg, var(--purple), var(--pink)); border-radius: 15px; padding: 10px 20px; font-size: 14px; font-weight: 700; text-align: center; }
    .progress-bar-wrap { flex:1; }
    .progress-bar-bg { background: rgba(255,255,255,0.1); border-radius:50px; height:12px; overflow:hidden; }
    .progress-bar-fill { background: linear-gradient(90deg, var(--cyan), var(--pink)); height:100%; border-radius:50px; transition:width 0.5s; }
    .games-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; width: 100%; max-width: 800px; }
    .game-card {
      background: linear-gradient(135deg, var(--card), var(--card2));
      border-radius: 20px; padding: 25px 20px; text-align: center; cursor: pointer;
      transition: all 0.3s; position: relative; overflow: hidden; border: 2px solid rgba(255,255,255,0.08);
    }
    .game-card:hover { transform: translateY(-6px); border-color: var(--pink); box-shadow: var(--shadow-pink); }
    .game-card .game-icon { font-size: 44px; display: block; margin-bottom: 10px; }
    .game-card .game-name { font-size: 17px; font-weight: 700; color: var(--white); margin-bottom: 4px; }
    .game-card .game-name-he { font-size: 13px; color: var(--cyan); margin-bottom: 8px; }
    .game-card .game-desc { font-size: 12px; color: rgba(240,230,255,0.6); }
    .stars-row { display:flex; justify-content:center; gap:4px; margin-top:10px; }
    .star { font-size:18px; opacity:0.3; }
    .star.earned { opacity:1; animation: star-pop 0.3s ease; }
    @keyframes star-pop { 0%{transform:scale(0)} 60%{transform:scale(1.4)} 100%{transform:scale(1)} }

    /* GAME SCREEN */
    .game-header {
      display: flex; align-items: center; gap: 12px; width: 100%; max-width: 750px;
      padding: 12px 16px; background: rgba(255,255,255,0.05); border-radius: 15px; margin-bottom: 20px;
    }
    .lives { display:flex; gap:4px; }
    .heart { font-size:22px; transition:all 0.3s; }
    .heart.lost { opacity:0.2; filter:grayscale(1); }
    .score-display { flex:1; text-align:center; font-size:18px; font-weight:700; color:var(--gold); }
    .hint-btn { background: rgba(255,215,0,0.15); border: 2px solid var(--gold); border-radius:10px; color:var(--gold); font-family:'Rubik',sans-serif; font-size:13px; font-weight:700; padding:6px 14px; cursor:pointer; transition:all 0.2s; }
    .hint-btn:hover { background:rgba(255,215,0,0.3); }
    .question-counter { font-size:13px; color:rgba(240,230,255,0.6); white-space:nowrap; }
    .game-area { width:100%; max-width:750px; }

    /* LETTER QUEST */
    .lq-word-display { display:flex; justify-content:center; align-items:center; gap:12px; margin:25px 0; flex-wrap:wrap; direction:ltr; }
    .lq-letter {
      width: 58px; height: 70px; background: linear-gradient(135deg, var(--card), var(--card2));
      border: 3px solid var(--purple); border-radius: 12px; display:flex; align-items:center;
      justify-content:center; font-size: 36px; font-weight: 900; font-family:'Orbitron',monospace;
      color: var(--white); transition: all 0.3s; text-transform: uppercase;
    }
    .lq-letter.blank { border-color: var(--pink); border-style: dashed; color: transparent; }
    .lq-letter.filled { border-color: var(--cyan); color: var(--cyan); box-shadow: var(--shadow-cyan); animation: pop 0.3s ease; }
    @keyframes pop { 0%{transform:scale(0.7)} 60%{transform:scale(1.2)} 100%{transform:scale(1)} }
    .lq-letter.correct { border-color: var(--green); color: var(--green); box-shadow: 0 0 20px rgba(0,230,118,0.5); }
    .lq-letter.wrong { border-color: var(--danger); color: var(--danger); animation: shake 0.4s ease; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
    .lq-image { font-size: 80px; text-align:center; margin-bottom:15px; filter:drop-shadow(0 0 10px rgba(255,45,158,0.4)); }
    .lq-hint-text { text-align:center; color:var(--gold); font-size:15px; background:rgba(255,215,0,0.1); border-radius:10px; padding:10px 20px; margin-bottom:15px; }
    .lq-letters-pool { display:flex; flex-wrap:wrap; gap:10px; justify-content:center; margin-top:20px; }
    .lq-pool-letter {
      width: 52px; height: 60px; background: linear-gradient(135deg, #3d0080, #6b21a8);
      border: 2px solid var(--purple); border-radius: 10px; cursor:pointer;
      font-size: 28px; font-weight: 900; font-family:'Orbitron',monospace;
      color: var(--white); display:flex; align-items:center; justify-content:center;
      transition: all 0.2s; text-transform: uppercase;
    }
    .lq-pool-letter:hover { transform:scale(1.1); border-color:var(--cyan); box-shadow:var(--shadow-cyan); }
    .lq-pool-letter:active { transform:scale(0.95); }
    .lq-pool-letter.used { opacity:0.2; pointer-events:none; }
    .lq-actions { display:flex; gap:10px; justify-content:center; margin-top:15px; }
    .btn-check { background:linear-gradient(135deg,var(--cyan),#00a896); border:none; border-radius:50px; color:#0d0021; font-family:'Rubik',sans-serif; font-size:17px; font-weight:900; padding:13px 40px; cursor:pointer; transition:all 0.2s; }
    .btn-check:hover { transform:scale(1.05); box-shadow:var(--shadow-cyan); }
    .btn-clear { background:transparent; border:2px solid rgba(255,255,255,0.2); border-radius:50px; color:rgba(240,230,255,0.6); font-family:'Rubik',sans-serif; font-size:14px; padding:10px 25px; cursor:pointer; transition:all 0.2s; }
    .btn-clear:hover { border-color:var(--pink); color:var(--pink); }

    /* SENTENCE DUEL */
    .sd-sentence {
      background: linear-gradient(135deg, var(--card), var(--card2)); border-radius:20px;
      padding:25px 30px; font-size:clamp(18px,3vw,24px); font-weight:500; line-height:1.6;
      text-align:center; margin-bottom:25px; border:1px solid rgba(255,255,255,0.1);
      direction: ltr; font-family:'Rubik',sans-serif;
    }
    .sd-blank { display:inline-block; min-width:100px; border-bottom:3px solid var(--pink); color:var(--pink); font-weight:700; padding:0 10px; }
    .sd-options { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .sd-option {
      background: linear-gradient(135deg, var(--card), var(--card2)); border: 2px solid rgba(255,255,255,0.15);
      border-radius:15px; padding:16px; font-family:'Rubik',sans-serif; font-size:18px; font-weight:700;
      color:var(--white); cursor:pointer; transition:all 0.2s; text-align:center; direction:ltr;
    }
    .sd-option:hover { border-color:var(--cyan); box-shadow:var(--shadow-cyan); transform:scale(1.02); }
    .sd-option.correct { border-color:var(--green); background:rgba(0,230,118,0.2); animation:pop 0.3s ease; }
    .sd-option.wrong { border-color:var(--danger); background:rgba(255,68,68,0.2); animation:shake 0.4s ease; }
    .sd-option.disabled { pointer-events:none; opacity:0.5; }
    .sd-hint-box { background:rgba(255,215,0,0.1); border:1px solid var(--gold); border-radius:12px; padding:15px 20px; margin-bottom:20px; font-size:14px; color:var(--gold); text-align:center; }
    .sd-next-btn { display:none; margin:20px auto; }
    .sd-battle { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
    .sd-char { text-align:center; font-size:60px; }
    .sd-vs { font-family:'Orbitron',monospace; font-size:24px; color:var(--pink); font-weight:900; }
    .hp-bar-wrap { width:120px; }
    .hp-bar-bg { background:rgba(255,255,255,0.1); border-radius:50px; height:10px; margin-top:5px; overflow:hidden; }
    .hp-bar-fill { height:100%; border-radius:50px; transition:width 0.5s; }
    .hp-romi { background:linear-gradient(90deg,var(--cyan),#00a8a8); }
    .hp-demon { background:linear-gradient(90deg,var(--danger),#990000); }

    /* WORD HUNT */
    .wh-grid { display:inline-grid; gap:2px; background:var(--card2); border:2px solid var(--purple); border-radius:15px; padding:10px; user-select:none; margin:0 auto; display:block; width:fit-content; }
    .wh-row { display:flex; gap:2px; }
    .wh-cell {
      width: 38px; height: 38px; background:var(--card); border-radius:6px; display:flex;
      align-items:center; justify-content:center; font-family:'Orbitron',monospace;
      font-size:16px; font-weight:700; cursor:pointer; transition:all 0.15s; color:var(--white);
      border:1px solid rgba(255,255,255,0.05);
    }
    .wh-cell:hover { background:rgba(107,33,168,0.5); }
    .wh-cell.selected { background:rgba(0,245,212,0.3); border-color:var(--cyan); color:var(--cyan); }
    .wh-cell.found { background:linear-gradient(135deg,rgba(0,230,118,0.3),rgba(0,245,212,0.2)); border-color:var(--green); color:var(--green); }
    .wh-words-list { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin-top:15px; }
    .wh-word-chip {
      background:rgba(107,33,168,0.3); border:1px solid var(--purple); border-radius:20px;
      padding:6px 16px; font-size:14px; font-weight:700; color:var(--white); direction:ltr;
    }
    .wh-word-chip.found { background:rgba(0,230,118,0.2); border-color:var(--green); color:var(--green); text-decoration:line-through; }
    .wh-translation { font-size:11px; color:rgba(240,230,255,0.5); display:block; }
    .wh-wrap { display:flex; gap:20px; align-items:flex-start; justify-content:center; flex-wrap:wrap; }

    /* PICTURE MATCH */
    .pm-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:20px; }
    .pm-image-card {
      background: var(--card); border: 3px solid rgba(255,255,255,0.1); border-radius:16px;
      padding:20px 15px; text-align:center; cursor:pointer; transition:all 0.2s; position:relative;
    }
    .pm-image-card:hover { border-color:var(--pink); box-shadow:var(--shadow-pink); }
    .pm-image-card.selected { border-color:var(--cyan); box-shadow:var(--shadow-cyan); }
    .pm-image-card.matched { border-color:var(--green); background:rgba(0,230,118,0.1); pointer-events:none; }
    .pm-image-card.wrong { border-color:var(--danger); animation:shake 0.4s ease; }
    .pm-emoji { font-size:48px; display:block; margin-bottom:8px; }
    .pm-label { font-size:12px; color:rgba(240,230,255,0.5); }
    .pm-words { display:flex; flex-wrap:wrap; gap:10px; justify-content:center; }
    .pm-word-btn {
      background:linear-gradient(135deg,var(--card),var(--card2)); border:2px solid var(--purple);
      border-radius:12px; padding:12px 24px; font-family:'Rubik',sans-serif; font-size:16px;
      font-weight:700; color:var(--white); cursor:pointer; transition:all 0.2s; direction:ltr;
    }
    .pm-word-btn:hover { border-color:var(--pink); box-shadow:var(--shadow-pink); }
    .pm-word-btn.selected { border-color:var(--cyan); color:var(--cyan); }
    .pm-word-btn.used { opacity:0.2; pointer-events:none; }
    .pm-instructions { text-align:center; font-size:14px; color:rgba(240,230,255,0.6); margin-bottom:15px; }

    /* RESULTS */
    .results-screen { background: radial-gradient(ellipse at 50% 30%, #3d006a 0%, #0d0021 70%); text-align:center; }
    .results-stars { display:flex; justify-content:center; gap:10px; margin:20px 0; }
    .results-star { font-size:52px; opacity:0.2; transform:scale(0); transition:all 0.4s; }
    .results-star.earned { opacity:1; transform:scale(1); filter:drop-shadow(0 0 10px gold); }
    .results-score { font-size:48px; font-weight:900; color:var(--gold); }
    .results-score span { font-size:24px; color:rgba(240,230,255,0.6); }
    .results-message { font-size:20px; color:var(--cyan); margin:10px 0 25px; }
    .results-btns { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; }
    .achievement-popup {
      position:fixed; bottom:30px; left:50%; transform:translateX(-50%) translateY(100px);
      background:linear-gradient(135deg,var(--purple),#3d0080); border:2px solid var(--gold);
      border-radius:15px; padding:15px 25px; text-align:center; font-size:14px; font-weight:700;
      color:var(--gold); z-index:100; transition:transform 0.5s; box-shadow:0 0 25px rgba(255,215,0,0.3);
    }
    .achievement-popup.show { transform:translateX(-50%) translateY(0); }

    /* HINT OVERLAY */
    .hint-overlay {
      position:fixed; inset:0; background:rgba(0,0,0,0.75); z-index:200; display:flex;
      align-items:center; justify-content:center; padding:20px;
    }
    .hint-box {
      background:linear-gradient(135deg,var(--card),var(--card2)); border:2px solid var(--gold);
      border-radius:20px; padding:30px; max-width:400px; width:100%; text-align:center;
    }
    .hint-box h3 { color:var(--gold); font-size:20px; margin-bottom:15px; }
    .hint-box p { color:var(--white); font-size:16px; line-height:1.6; margin-bottom:20px; }
    .hint-box .hint-example { background:rgba(0,245,212,0.1); border:1px solid var(--cyan); border-radius:10px; padding:10px; margin-bottom:15px; font-size:14px; color:var(--cyan); direction:ltr; }

    /* BACK BTN */
    .back-btn { position:fixed; top:15px; right:15px; background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.15); border-radius:12px; color:var(--white); font-family:'Rubik',sans-serif; font-size:13px; padding:8px 16px; cursor:pointer; z-index:50; transition:all 0.2s; }
    .back-btn:hover { background:rgba(255,255,255,0.15); }
    .feedback-overlay { position:fixed; inset:0; z-index:150; pointer-events:none; display:flex; align-items:center; justify-content:center; }
    .feedback-msg { font-size:56px; animation:feedback-pop 0.8s ease forwards; opacity:0; }
    @keyframes feedback-pop { 0%{opacity:0;transform:scale(0.5)} 30%{opacity:1;transform:scale(1.3)} 70%{opacity:1;transform:scale(1)} 100%{opacity:0;transform:scale(0.8) translateY(-50px)} }

    /* RESPONSIVE */
    @media(max-width:500px) {
      .games-grid { grid-template-columns:1fr; }
      .sd-options { grid-template-columns:1fr; }
      .pm-grid { grid-template-columns:1fr 1fr; }
      .wh-cell { width:32px; height:32px; font-size:13px; }
      .grades-grid { flex-direction:column; align-items:center; }
    }
    .loading-dots::after { content:''; animation:dots 1.2s steps(3,end) infinite; }
    @keyframes dots { 0%{content:''} 33%{content:'.'} 66%{content:'..'} 100%{content:'...'} }
    .glow-text { text-shadow:0 0 15px currentColor; }
    .mt-20 { margin-top:20px; }
  </style>
</head>
<body>
<div id="app"></div>

<script>
// ═══════════════════════════════════════
//  ROMI VOICE (Web Speech API)
// ═══════════════════════════════════════
let _romiVoice = null;
function _loadRomiVoice() {
  if (_romiVoice) return;
  const voices = window.speechSynthesis.getVoices();
  // prefer female English voice
  _romiVoice = voices.find(v => v.lang.startsWith('en') && /female|woman|girl|zira|samantha|victoria|karen|moira|fiona|tessa|susan|helen/i.test(v.name))
    || voices.find(v => v.lang.startsWith('en'))

function speakRomi(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  _loadRomiVoice();
  const utt = new SpeechSynthesisUtterance(text);
  if (_romiVoice) utt.voice = _romiVoice;
  utt.lang = 'en-US';
  utt.pitch = 1.3;   // slightly higher – Romi is young and energetic
  utt.rate  = 0.92;
  utt.volume = 1;
  window.speechSynthesis.speak(utt);
}

function saveProgress() {
  localStorage.setItem('kpopProgress', JSON.stringify(state.progress));
}

function getKey() { return `${state.grade}-${state.difficulty}-${state.gameType}`; }

function getStars(key) {
  const k = key || getKey();
  return state.progress[k] || 0;
}

function setStars(score) {
  const key = getKey();
  const pct = score / state.totalQ;
  const stars = pct >= 0.9 ? 3 : pct >= 0.6 ? 2 : pct >= 0.3 ? 1 : 0;
  if (stars > (state.progress[key] || 0)) {
    state.progress[key] = stars;
    saveProgress();
  }
  return stars;
}

// ═══════════════════════════════════════
//  WORD HUNT ENGINE
// ═══════════════════════════════════════
function generateWordGrid(words, size) {
  const grid = Array.from({length:size}, () => Array(size).fill(''));
  const placed = [];
  const ALPHA = 'ABCDEFGHIJKLMNOPRSTUVWYZ';

  for (const word of words) {
    let placed_word = false;
    for (let attempt = 0; attempt < 100 && !placed_word; attempt++) {
      const horiz = Math.random() < 0.5;
      const row = Math.floor(Math.random() * (horiz ? size : size - word.length));
      const col = Math.floor(Math.random() * (horiz ? size - word.length : size));
      let ok = true;
      for (let i = 0; i < word.length; i++) {
        const r = horiz ? row : row + i;
        const c = horiz ? col + i : col;
        if (grid[r][c] !== '' && grid[r][c] !== word[i]) { ok = false; break; }
      }
      if (ok) {
        for (let i = 0; i < word.length; i++) {
          const r = horiz ? row : row + i;
          const c = horiz ? col + i : col;
          grid[r][c] = word[i];
        }
        placed.push({ word, row, col, horiz });
        placed_word = true;
      }
    }
  }
  // fill blanks
  for (let r = 0; r < size; r++)
    for (let c = 0; c < size; c++)
      if (!grid[r][c]) grid[r][c] = ALPHA[Math.floor(Math.random() * ALPHA.length)];

  return { grid, placed };
}

function starsHTML(count) {
  return [1,2,3].map(i => `<span class="star ${i <= count ? 'earned' : ''}">⭐</span>`).join('');
}

function diffLabel(d) {
  return d === 'easy' ? '🟢 קל' : d === 'medium' ? '🟡 בינוני' : '🔴 קשה';
}
function gradeLabel(g) {
  return `כיתה ${g === 'grade4' ? 'ד' : g === 'grade5' ? 'ה' : 'ו'}`;
}

function createParticles() {
  const emojis = ['🌸','✨','⭐','💫','🌟','🎵','🌺','🦋'];
  return Array.from({length:12}, (_,i) => {
    const e = emojis[i % emojis.length];
    const left = (i * 8.5) % 100;
    const delay = (i * 0.3) % 4;
    return `<div class="particle" style="left:${left}%;animation-delay:${delay}s;animation-duration:${3+Math.random()*3}s">${e}</div>`;
  }).join('');
}

function showFeedback(msg) {
  const el = document.getElementById('feedback');
  if (!el) return;
  el.innerHTML = `<div class="feedback-msg">${msg}</div>`;
  setTimeout(() => { if(el) el.innerHTML = ''; }, 900);
}

function getGradeStars(gradeKey) {
  const keys = Object.keys(state.progress).filter(k => k.startsWith(gradeKey));
  if (!keys.length) return 0;
  const avg = keys.reduce((a,k) => a + state.progress[k], 0) / keys.length;
  return Math.round(avg);
}

              <div class="stars-row">${starsHTML(stars)}</div>
            </div>`;
        }).join('')}
      </div>
    </div>`;
}

// ═══════════════════════════════════════
//  GAME INIT
// ═══════════════════════════════════════
function startGame(gameType) {
  state.gameType = gameType;
  state.score = 0;
  state.lives = 3;
  state.questionIndex = 0;
  state.hintsLeft = 3;
  state.hintActive = false;
  state.romiHP = 100;
  state.demonHP = 100;

  const data = CONTENT[state.grade][state.difficulty][gameType];
  state.totalQ = Array.isArray(data) ? data.length : (data.words ? data.words.length : 8);

  if (gameType === 'letterQuest') {
    state.lq = { filledLetters: {}, usedPoolIndices: [] };
  } else if (gameType === 'wordHunt') {
    const { grid, placed } = generateWordGrid(data.words, data.gridSize);
    state.wh = {
      grid, placed,
      selecting: false, startCell: null, currentCells: [], foundWords: [],
      mouseDown: false,
    };
  } else if (gameType === 'pictureMatch') {
    state.pm = { selectedWord: null, matchedPairs: [], selectedImage: null, score: 0 };
    // shuffle the data
    state.pm.items = [...data].sort(() => Math.random() - 0.5).slice(0, 4);
    state.pm.shuffledWords = [...state.pm.items].sort(() => Math.random() - 0.5).map(i => i.word);
  }

  state.screen = 'game';
  render();
}

// ═══════════════════════════════════════
//  SCREEN: GAME
// ═══════════════════════════════════════
function renderGame() {
  const gameNames = {
    letterQuest: '🔤 מסע האותיות',
    sentenceDuel: '⚔️ דו-קרב המשפטים',
    wordHunt: '🔍 ציד המילים',
    pictureMatch: '🖼️ התאמת תמונות',
  };
  const heartsHtml = [1,2,3].map(i =>
    `<span class="heart ${i > state.lives ? 'lost' : ''}">❤️</span>`
  ).join('');

  const gameContent = (() => {
    switch(state.gameType) {
      case 'letterQuest': return renderLetterQuest();
      case 'sentenceDuel': return renderSentenceDuel();
      case 'wordHunt': return renderWordHunt();
      case 'pictureMatch': return renderPictureMatch();
      default: return '<p>טוען<span class="loading-dots"></span></p>';
    }
  })();

  const hintBox = state.hintActive ? renderHintBox() : '';

  return `
    <div class="screen" style="background:#0d0021;justify-content:flex-start;padding-top:80px;">
      <div id="feedback" class="feedback-overlay"></div>
      ${hintBox}
      <button class="back-btn" onclick="navigate('gameHub')">← חזרה</button>
      <div style="width:100%;max-width:750px;text-align:center;margin-bottom:8px;">
        <span style="font-size:17px;font-weight:700;color:var(--pink);">${gameNames[state.gameType]}</span>
      </div>
      <div class="game-header">
        <div class="lives">${heartsHtml}</div>
        <div class="score-display">⭐ ${state.score}</div>
        <button class="hint-btn" onclick="toggleHint()">💡 רמז (${state.hintsLeft})</button>
        <div class="question-counter">${state.questionIndex + 1} / ${state.totalQ}</div>
      </div>
      <div class="game-area" id="game-area">
        ${gameContent}
      </div>
    </div>`;
}

// ═══════════════════════════════════════
//  LETTER QUEST
// ═══════════════════════════════════════
function renderLetterQuest() {
  const data = CONTENT[state.grade][state.difficulty].letterQuest;
  if (state.questionIndex >= data.length) { endGame(); return ''; }
  const q = data[state.questionIndex];
  const word = q.word.toUpperCase();

  const letterBoxes = word.split('').map((letter, i) => {
    const isBlank = q.blanks.includes(i);
    const filled = state.lq.filledLetters[i];
    if (!isBlank) return `<div class="lq-letter">${letter}</div>`;
    if (filled) return `<div class="lq-letter filled" data-blank="${i}">${filled}</div>`;
    return `<div class="lq-letter blank" data-blank="${i}">_</div>`;
  }).join('');

  // Generate pool: correct letters + distractors
  const correctLetters = q.blanks.map(i => word[i]);
  const distract = 'ABCDEFGHIJKLMNOPRSTUVWYZ'.split('').filter(l => !correctLetters.includes(l));
  const poolLetters = [...correctLetters];
  while (poolLetters.length < 8) {
    const r = distract[Math.floor(Math.random() * distract.length)];
    if (!poolLetters.includes(r)) poolLetters.push(r);
  }
  // Shuffle pool (but keep stable via seed)
  const pool = poolLetters.sort((a,b) => a.charCodeAt(0)*7 % 13 - b.charCodeAt(0)*7 % 13);

  const hintText = state.hintActive
    ? `<div class="lq-hint-text">💡 ${q.hint}</div>` : '';

  const poolHtml = pool.map((letter, idx) => {
    const isUsed = state.lq.usedPoolIndices.includes(idx);
    return `<div class="lq-pool-letter ${isUsed ? 'used' : ''}" data-pool="${idx}" onclick="lqPickLetter(${idx}, '${letter}')">${letter}</div>`;
  }).join('');

  return `
    <div style="text-align:center;">
      <div class="lq-image">${q.image}</div>
      ${hintText}
      <div class="lq-word-display" id="lq-word">${letterBoxes}</div>
      <div class="lq-letters-pool" id="lq-pool">${poolHtml}</div>
      <div class="lq-actions">
        <button class="btn-clear" onclick="lqClear()">↩️ נקה</button>
        <button class="btn-check" onclick="lqCheck()">✅ בדוק</button>
      </div>
    </div>`;
}

function lqPickLetter(idx, letter) {
  const data = CONTENT[state.grade][state.difficulty].letterQuest;
  const q = data[state.questionIndex];
  // find first unfilled blank
  const nextBlank = q.blanks.find(i => !state.lq.filledLetters[i]);
  if (nextBlank === undefined) return;
  state.lq.filledLetters[nextBlank] = letter;
  state.lq.usedPoolIndices.push(idx);
  refreshGameArea();
}

function lqClear() {
  state.lq.filledLetters = {};
  state.lq.usedPoolIndices = [];
  refreshGameArea();
}

function lqCheck() {
  const data = CONTENT[state.grade][state.difficulty].letterQuest;
  const q = data[state.questionIndex];
  const allFilled = q.blanks.every(i => state.lq.filledLetters[i]);
  if (!allFilled) { showFeedback('⚠️'); return; }

  const correct = q.blanks.every(i => state.lq.filledLetters[i] === q.word[i].toUpperCase());
  if (correct) {
    state.score++;
    showFeedback('✨');
    romiCorrectSound();
    setTimeout(() => {
      state.questionIndex++;
      state.lq = { filledLetters: {}, usedPoolIndices: [] };
      if (state.questionIndex >= data.length) { endGame(); return; }
      refreshGameArea();
    }, 900);
  } else {
    state.lives = Math.max(0, state.lives - 1);
    showFeedback('💥');
    state.lq = { filledLetters: {}, usedPoolIndices: [] };
    if (state.lives <= 0) { setTimeout(endGame, 800); return; }
    refreshGameArea();
  }
}

// ═══════════════════════════════════════
//  SENTENCE DUEL
// ═══════════════════════════════════════
function renderSentenceDuel() {
  const data = CONTENT[state.grade][state.difficulty].sentenceDuel;
  if (state.questionIndex >= data.length) { endGame(); return ''; }
  const q = data[state.questionIndex];
  const demonType = state.questionIndex > 5 ? 'boss' : state.questionIndex > 3 ? 'mini' : 'normal';

  const sentenceHtml = q.sentence.replace('___', `<span class="sd-blank" id="sd-blank">${state.sd_selected || '___'}</span>`);
  const hintHtml = state.hintActive
    ? `<div class="sd-hint-box">💡 <strong>רמז דקדוקי:</strong> ${q.hint}</div>` : '';

  const romiHPPct = Math.round(state.romiHP);
  const demonHPPct = Math.round(state.demonHP);

  return `
    <div>
      <div class="sd-battle">
        <div style="text-align:right;">
          ${romiSVG('battle')}
          <div class="hp-bar-wrap">
            <div style="font-size:11px;color:var(--cyan);">רומי</div>
            <div class="hp-bar-bg"><div class="hp-bar-fill hp-romi" style="width:${romiHPPct}%"></div></div>
          </div>
        </div>
        <div class="sd-vs">VS</div>
        <div style="text-align:left;">
          ${demonSVG(demonType)}
          <div class="hp-bar-wrap">
            <div style="font-size:11px;color:var(--danger);">שד</div>
            <div class="hp-bar-bg"><div class="hp-bar-fill hp-demon" style="width:${demonHPPct}%"></div></div>
          </div>
        </div>
      </div>
      ${hintHtml}
      <div class="sd-sentence">${sentenceHtml}</div>
      <div class="sd-options" id="sd-options">
        ${q.options.map(opt =>
          `<button class="sd-option" onclick="sdAnswer('${opt}', this)">${opt}</button>`
        ).join('')}
      </div>
    </div>`;
}

function sdAnswer(answer, btn) {
  const data = CONTENT[state.grade][state.difficulty].sentenceDuel;
  const q = data[state.questionIndex];
  const allBtns = document.querySelectorAll('.sd-option');
  allBtns.forEach(b => b.classList.add('disabled'));

  if (answer === q.answer) {
    btn.classList.add('correct');
    state.score++;
    state.demonHP = Math.max(0, state.demonHP - 30);
    showFeedback('⚔️✨');
    romiCorrectSound();
    setTimeout(() => {
      state.questionIndex++;
      state.hintActive = false;
      if (state.questionIndex >= data.length) { endGame(); return; }
      render();
    }, 1000);
  } else {
    btn.classList.add('wrong');
    // show correct
    allBtns.forEach(b => { if(b.textContent === q.answer) b.classList.add('correct'); });
    state.lives = Math.max(0, state.lives - 1);
    state.romiHP = Math.max(0, state.romiHP - 30);
    showFeedback('💥');
    if (state.lives <= 0) { setTimeout(endGame, 1200); return; }
    setTimeout(() => {
      state.questionIndex++;
      state.hintActive = false;
      if (state.questionIndex >= data.length) { endGame(); return; }
      render();
    }, 1500);
  }
}

// ═══════════════════════════════════════
//  WORD HUNT
// ═══════════════════════════════════════
function renderWordHunt() {
  const data = CONTENT[state.grade][state.difficulty].wordHunt;
  const { grid, foundWords, currentCells } = state.wh;
  const size = grid.length;

  const gridHtml = grid.map((row, r) =>
    `<div class="wh-row">${row.map((letter, c) => {
      const isFound = state.wh.placed.some(p => {
        if (!foundWords.includes(p.word)) return false;
        for (let i = 0; i < p.word.length; i++) {
          const pr = p.horiz ? p.row : p.row + i;
          const pc = p.horiz ? p.col + i : p.col;
          if (pr === r && pc === c) return true;
        }
        return false;
      });
      const isSelected = currentCells.some(([cr,cc]) => cr === r && cc === c);
      return `<div class="wh-cell ${isFound ? 'found' : isSelected ? 'selected' : ''}"
        onmousedown="whMouseDown(${r},${c})" onmouseover="whMouseOver(${r},${c})" onmouseup="whMouseUp(${r},${c})"
        ontouchstart="whMouseDown(${r},${c})" ontouchend="whMouseUp(${r},${c})"
        >${letter}</div>`;
    }).join('')}</div>`
  ).join('');

  const wordsHtml = data.words.map((word, i) =>
    `<div class="wh-word-chip ${foundWords.includes(word) ? 'found' : ''}">
      ${word}<span class="wh-translation">${data.translations[i]}</span>
    </div>`
  ).join('');

  const allFound = foundWords.length >= data.words.length;
  if (allFound && !state.wh.finished) {
    state.wh.finished = true;
    state.score = data.words.length;
    setTimeout(endGame, 1500);
  }

  return `
    <div>
      <div class="wh-wrap" onmouseleave="whMouseUp(null,null)">
        <div>
          <div class="wh-grid" id="wh-grid">${gridHtml}</div>
        </div>
        <div>
          <div style="color:var(--cyan);font-size:14px;font-weight:700;margin-bottom:10px;text-align:center;">מצא/י את המילים:</div>
          <div class="wh-words-list">${wordsHtml}</div>
          <div style="margin-top:15px;text-align:center;color:var(--gold);font-size:13px;">${foundWords.length} / ${data.words.length} מילים</div>
        </div>
      </div>
    </div>`;
}

function whMouseDown(r, c) {
  state.wh.mouseDown = true;
  state.wh.startCell = [r, c];
  state.wh.currentCells = [[r, c]];
  refreshGameArea();
}

function whMouseOver(r, c) {
  if (!state.wh.mouseDown || !state.wh.startCell) return;
  const [sr, sc] = state.wh.startCell;
  const dr = r - sr, dc = c - sc;
  const cells = [[sr, sc]];
  if (dr === 0 && dc !== 0) {
    const step = dc > 0 ? 1 : -1;
    for (let i = sc + step; step > 0 ? i <= c : i >= c; i += step) cells.push([sr, i]);
  } else if (dc === 0 && dr !== 0) {
    const step = dr > 0 ? 1 : -1;
    for (let i = sr + step; step > 0 ? i <= r : i >= r; i += step) cells.push([i, sc]);
  }
  state.wh.currentCells = cells;
  refreshGameArea();
}

function whMouseUp(r, c) {
  if (!state.wh.mouseDown) return;
  state.wh.mouseDown = false;
  // check if selected cells form a word
  const cells = state.wh.currentCells;
  const selectedWord = cells.map(([r,c]) => state.wh.grid[r][c]).join('');
  const data = CONTENT[state.grade][state.difficulty].wordHunt;
  const found = data.words.find(w => w === selectedWord || w === selectedWord.split('').reverse().join(''));
  if (found && !state.wh.foundWords.includes(found)) {
    state.wh.foundWords.push(found);
    state.score++;
    showFeedback('🌟');
    romiCorrectSound();
  }
  state.wh.currentCells = [];
  state.wh.startCell = null;
  refreshGameArea();
}

// ═══════════════════════════════════════
//  PICTURE MATCH
// ═══════════════════════════════════════
function renderPictureMatch() {
  const { items, shuffledWords, matchedPairs, selectedImage, selectedWord } = state.pm;

  const imagesHtml = items.map((item, i) => {
    const isMatched = matchedPairs.some(p => p.idx === i);
    const isSelected = selectedImage === i;
    return `<div class="pm-image-card ${isMatched ? 'matched' : isSelected ? 'selected' : ''}" onclick="pmSelectImage(${i})">
      <span class="pm-emoji">${item.emoji}</span>
      <div class="pm-label">${item.he}</div>
      ${isMatched ? '<div style="color:var(--green);font-size:12px;font-weight:700;margin-top:4px;">✓ '+item.word+'</div>' : ''}
    </div>`;
  }).join('');

  const wordsHtml = shuffledWords.map((word, i) => {
    const isUsed = matchedPairs.some(p => p.word === word);
    const isSelected = selectedWord === word;
    return `<div class="pm-word-btn ${isUsed ? 'used' : isSelected ? 'selected' : ''}" onclick="pmSelectWord('${word}')" dir="ltr">${word}</div>`;
  }).join('');

  const allMatched = matchedPairs.length >= items.length;
  if (allMatched && !state.pm.finished) {
    state.pm.finished = true;
    setTimeout(() => {
      // load next batch
      const data = CONTENT[state.grade][state.difficulty].pictureMatch;
      const nextStart = (state.questionIndex + 4);
      if (nextStart >= data.length) { endGame(); return; }
      state.questionIndex += 4;
      const nextItems = [...data].sort(() => Math.random()-0.5).slice(0,4);
      state.pm = {
        items: nextItems,
        shuffledWords: [...nextItems].sort(() => Math.random()-0.5).map(i => i.word),
        matchedPairs: [], selectedImage: null, selectedWord: null,
        score: state.score, finished: false
      };
      refreshGameArea();
    }, 1200);
  }

  return `
    <div>
      <div class="pm-instructions">קודם בחר/י תמונה, אחר כך בחר/י את המילה המתאימה 👇</div>
      <div class="pm-grid" id="pm-images">${imagesHtml}</div>
      <div class="pm-words" id="pm-words">${wordsHtml}</div>
    </div>`;
}

function pmSelectImage(idx) {
  state.pm.selectedImage = idx;
  if (state.pm.selectedWord) pmTryMatch();
  else refreshGameArea();
}

function pmSelectWord(word) {
  state.pm.selectedWord = word;
  if (state.pm.selectedImage !== null) pmTryMatch();
  else refreshGameArea();
}

function pmTryMatch() {
  const { selectedImage, selectedWord, items } = state.pm;
  const item = items[selectedImage];
  if (item.word === selectedWord) {
    state.pm.matchedPairs.push({ idx: selectedImage, word: selectedWord });
    state.score++;
    showFeedback('✨');
    romiCorrectSound();
  } else {
    showFeedback('❌');
    state.lives = Math.max(0, state.lives - 1);
    if (state.lives <= 0) { setTimeout(endGame, 800); return; }
  }
  state.pm.selectedImage = null;
  state.pm.selectedWord = null;
  refreshGameArea();
}

// ═══════════════════════════════════════
//  HINT SYSTEM
// ═══════════════════════════════════════
function renderHintBox() {
  const data = CONTENT[state.grade][state.difficulty];
  let hintText = '';
  if (state.gameType === 'letterQuest') {
    hintText = data.letterQuest[state.questionIndex]?.hint || '';
  } else if (state.gameType === 'sentenceDuel') {
    hintText = data.sentenceDuel[state.questionIndex]?.hint || '';
  } else if (state.gameType === 'wordHunt') {
    hintText = 'מצא/י מילה בשורה (→) או בעמודה (↓). לחץ/י על האות הראשונה וגרור/י לאות האחרונה!';
  } else {
    hintText = 'בחר/י תמונה ואחר כך בחר/י את המילה האנגלית המתאימה לה';
  }
  return `
    <div class="hint-overlay" onclick="closeHint()">
      <div class="hint-box" onclick="event.stopPropagation()">
        <h3>💡 רמז</h3>
        <p>${hintText}</p>
        <button class="btn-primary" onclick="closeHint()" style="font-size:14px;padding:10px 25px;">הבנתי!</button>
      </div>
    </div>`;
}

function toggleHint() {
  if (!state.hintActive && state.hintsLeft > 0) {
    state.hintActive = true;
    state.hintsLeft--;
    render();
  } else if (state.hintActive) {
    closeHint();
  }
}

function closeHint() {
  state.hintActive = false;
  render();
}

// ═══════════════════════════════════════
//  RESULTS
// ═══════════════════════════════════════
function endGame() {
  state.screen = 'results';
  render();
  const stars = setStars(state.score);
  const pct = state.score / state.totalQ;
  setTimeout(() => romiWinSound(pct), 600);
  setTimeout(() => {
    const starsEls = document.querySelectorAll('.results-star');
    starsEls.forEach((el, i) => {
      setTimeout(() => { if (i < stars) el.classList.add('earned'); }, i * 400);
    });
  }, 300);
  if (state.score >= state.totalQ * 0.8) {
    setTimeout(() => {
      const popup = document.getElementById('achievement-popup');
      if (popup) { popup.classList.add('show'); setTimeout(() => popup.classList.remove('show'), 3000); }
    }, 1500);
  }
}

function renderResults() {
  const pct = Math.round(state.score / state.totalQ * 100);
  const message = pct >= 90 ? '🌟 מדהים! רומי גאה בך!'
    : pct >= 70 ? '✨ כל הכבוד! תוצאה מצוינת!'
    : pct >= 50 ? '👍 יפה! קצת עוד אימון ותגיע לקדושה!'
    : '💪 נסה/י שוב - אתה יכול/ה!';

  return `
    <div class="screen results-screen">
      ${romiSVG(pct >= 70 ? 'happy' : 'normal')}
      <div class="results-stars">
        <span class="results-star" id="star-1">⭐</span>
        <span class="results-star" id="star-2">⭐</span>
        <span class="results-star" id="star-3">⭐</span>
      </div>
      <div class="results-score">${state.score}<span> / ${state.totalQ}</span></div>
      <div class="results-message">${message}</div>
      <div class="results-btns">
        <button class="btn-primary" onclick="restartGame()">🔄 שחק/י שוב</button>
        <button class="btn-secondary" onclick="navigate('gameHub')">🎮 בחר/י משחק</button>
        <button class="btn-secondary" onclick="navigate('welcome')">🏠 בית</button>
      </div>
      <div id="achievement-popup" class="achievement-popup">🏆 הישג חדש! רמה ${gradeLabel(state.grade)} הושלמה!</div>
    </div>`;
}

function restartGame() {
  startGame(state.gameType);
}

// ═══════════════════════════════════════
//  NAVIGATION
// ═══════════════════════════════════════
function navigate(screen) {
  state.hintActive = false;
  if (screen === 'gameHub') state.screen = 'gameHub';
  else if (screen === 'levelSelect') { state.grade = null; state.difficulty = null; state.screen = 'levelSelect'; }
  else state.screen = screen;
  render();
}

function selectGrade(grade) {
  state.grade = grade;
  render(); // show difficulty selector
}

function selectDiff(diff) {
  state.difficulty = diff;
  state.screen = 'gameHub';
  render();
}

// ═══════════════════════════════════════
//  RENDER ENGINE
// ═══════════════════════════════════════
function refreshGameArea() {
  const area = document.getElementById('game-area');
  if (!area) { render(); return; }
  const gameContent = (() => {
    switch(state.gameType) {
      case 'letterQuest': return renderLetterQuest();
      case 'sentenceDuel': return renderSentenceDuel();
      case 'wordHunt': return renderWordHunt();
      case 'pictureMatch': return renderPictureMatch();
      default: return '';
    }
  })();
  area.innerHTML = gameContent;
  // update header
  const heartsEl = document.querySelector('.lives');
  if (heartsEl) heartsEl.innerHTML = [1,2,3].map(i => `<span class="heart ${i > state.lives ? 'lost' : ''}">❤️</span>`).join('');
  const scoreEl = document.querySelector('.score-display');
  if (scoreEl) scoreEl.innerHTML = `⭐ ${state.score}`;
  const counterEl = document.querySelector('.question-counter');
  if (counterEl) counterEl.innerHTML = `${state.questionIndex + 1} / ${state.totalQ}`;
  const hintBtn = document.querySelector('.hint-btn');
  if (hintBtn) hintBtn.textContent = `💡 רמז (${state.hintsLeft})`;
}

function render() {
  const app = document.getElementById('app');
  switch(state.screen) {
    case 'welcome': app.innerHTML = renderWelcome(); break;
    case 'levelSelect': app.innerHTML = renderLevelSelect(); break;
    case 'gameHub': app.innerHTML = renderGameHub(); break;
    case 'game': app.innerHTML = renderGame(); break;
    case 'results': app.innerHTML = renderResults(); break;
    default: app.innerHTML = renderWelcome();
  }
}

// ═══════════════════════════════════════
//  GLOBAL MOUSE/TOUCH
